services:
  app:
    image: ${APP_DOCKER_IMAGE:-yii3-template-app:latest}
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
      args:
        USER_ID: ${LOCAL_UID:-1000}
        GROUP_ID: ${LOCAL_GID:-1000}
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: dev
      APP_DEBUG: "true"
      SERVER_NAME: ":80"
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      COMPOSER_CACHE_DIR: /app/runtime/cache/composer
      DB_DSN: mysql:host=db;port=3306;dbname=${DB_DATABASE:-yii3_template}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${DEV_PORT:-8080}:80"
    volumes:
      - ./:/app
      - ./runtime:/app/runtime
      - caddy_data:/data
      - caddy_config:/config
    tty: true

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-yii3_template}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    healthcheck:
      # -h 127.0.0.1 forza il TCP: con "localhost" (socket) il ping risponde
      # anche durante la fase initdb.d, quando il server temporaneo gira senza
      # rete e la porta 3306 è ancora chiusa — e --wait/depends_on scattano
      # prima che il server vero accetti connessioni.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      # initdb.d gira solo alla prima inizializzazione del volume, in ordine
      # alfabetico. release_1_0_2 è lo schema base completo (crea anche
      # core_user, referenziata dalle FK di release_1_0_0) e DEVE andare
      # prima; stesso ordine della catena App\Migrations.
      - ./database/migrations/release_1_0_2.sql:/docker-entrypoint-initdb.d/01-release_1_0_2.sql:ro
      - ./database/migrations/release_1_0_0.sql:/docker-entrypoint-initdb.d/02-release_1_0_0.sql:ro
      - ./database/migrations/release_1_0_1.sql:/docker-entrypoint-initdb.d/03-release_1_0_1.sql:ro
      - ./database/seeders/release_1_0_0.sql:/docker-entrypoint-initdb.d/04-seed-release_1_0_0.sql:ro

volumes:
  caddy_data:
  caddy_config:
  db_data:
