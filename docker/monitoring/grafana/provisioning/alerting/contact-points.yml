# Contact point per le notifiche degli alert: bot Telegram.
# Token e chat ID arrivano dall'ambiente del container Grafana
# (docker/monitoring/.env, vedi .env.example): il provisioning di
# Grafana espande $VAR dai valori d'ambiente.
apiVersion: 1

contactPoints:
  - orgId: 1
    name: telegram
    receivers:
      - uid: telegram-ops
        type: telegram
        settings:
          bottoken: $TELEGRAM_BOT_TOKEN
          # Quote escapate NECESSARIE: dopo l'espansione Grafana ri-tipizza
          # il valore, e un chat ID numerico diventerebbe un numero JSON —
          # la validazione del receiver esige una stringa e l'errore è
          # FATALE al boot (crash-loop osservato il 2026-07-08).
          chatid: "\"$TELEGRAM_CHAT_ID\""
