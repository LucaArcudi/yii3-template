# Loki in modalità single-binary su filesystem: dimensionato per un
# singolo VPS (nessuna replica, storage locale nel volume loki_data).
# Validato in CI con `loki -verify-config`.
auth_enabled: false

server:
  http_listen_port: 3100

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  replication_factor: 1
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2026-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Retention allineata a quella dei backup DB (14 giorni): oltre, i log
# vengono eliminati dal compactor.
limits_config:
  retention_period: 336h

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

analytics:
  reporting_enabled: false
