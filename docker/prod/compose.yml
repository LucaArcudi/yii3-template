services:
  app:
    image: ${APP_IMAGE:-ghcr.io/lucaarcudi/yii3-template:latest}
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: prod
      APP_DEBUG: "false"
      SERVER_NAME: "${SERVER_NAME:-:80}"
      DB_DSN: "mysql:host=db;port=3306;dbname=${DB_DATABASE:-yii3_template}"
      DB_USERNAME: "${DB_USERNAME:-yii3_template}"
      DB_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env.prod}"
      AUTH_COOKIE_SECRET_KEY: "${AUTH_COOKIE_SECRET_KEY:?Set AUTH_COOKIE_SECRET_KEY in .env.prod}"
    networks:
      - app_internal
      - caddy_public
    ports:
      # Solo loopback: il traffico pubblico passa dal reverse proxy Caddy (TLS);
      # la porta locale resta per healthcheck e debug dal VPS.
      - "127.0.0.1:${APP_PORT:-8080}:80"
    volumes:
      - runtime:/app/runtime
      - caddy_data:/data
      - caddy_config:/config
    labels:
      caddy: ${PROD_HOST:-app.example.com}
      caddy.reverse_proxy: "{{upstreams 80}}"
    restart: unless-stopped

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-yii3_template}"
      MYSQL_USER: "${DB_USERNAME:-yii3_template}"
      MYSQL_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env.prod}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env.prod}"
    healthcheck:
      # -h 127.0.0.1 forza il TCP: con "localhost" (socket) il ping risponde
      # anche durante la fase initdb.d, quando il server temporaneo gira senza
      # rete e la porta 3306 è ancora chiusa — e --wait/depends_on scattano
      # prima che il server vero accetti connessioni.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app_internal
    volumes:
      - db_data:/var/lib/mysql
      # NB: MySQL esegue gli script di initdb.d in ordine alfabetico e solo
      # alla prima inizializzazione del volume. release_1_0_2 è lo schema base
      # completo (crea anche core_user, referenziata dalle FK di
      # release_1_0_0) e DEVE andare prima; stesso ordine di App\Migrations.
      - ../../database/migrations/release_1_0_2.sql:/docker-entrypoint-initdb.d/00-release_1_0_2.sql:ro
      - ../../database/migrations/release_1_0_0.sql:/docker-entrypoint-initdb.d/01-release_1_0_0.sql:ro
      - ../../database/migrations/release_1_0_1.sql:/docker-entrypoint-initdb.d/02-release_1_0_1.sql:ro
      - ../../database/seeders/release_1_0_0.sql:/docker-entrypoint-initdb.d/03-seed-release_1_0_0.sql:ro
    restart: unless-stopped

volumes:
  runtime:
  caddy_data:
  caddy_config:
  db_data:

networks:
  app_internal:
  caddy_public:
    external: true
