# Reverse proxy per il VPS: legge le label caddy.* dei container sulla rete
# caddy_public e genera la config con HTTPS automatico (Let's Encrypt).
# Deployato da ansible/playbooks/proxy.yml in ~/caddy-proxy sul server.
services:
  caddy:
    image: lucaslorentz/caddy-docker-proxy:2.13-alpine
    container_name: caddy-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_INGRESS_NETWORKS: caddy_public
      # Caddyfile base fuso con la config generata: abilita le metriche
      # HTTP servite su :9180 (solo rete interna, vedi Caddyfile.base).
      CADDY_DOCKER_CADDYFILE_PATH: /etc/caddy/Caddyfile.base
    networks:
      - caddy_public
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - caddy_proxy_data:/data
      - ./Caddyfile.base:/etc/caddy/Caddyfile.base:ro

volumes:
  caddy_proxy_data:

networks:
  caddy_public:
    external: true
