---
# Configura l'app di produzione dietro il proxy Caddy (TLS):
# PROD_HOST, override locale minimo, ricreazione container e health check.
# Non richiede root. (Prossimo step: .env.prod templato con ansible-vault.)
- name: Configure app behind Caddy TLS proxy
  hosts: vps
  become: false
  gather_facts: false

  vars:
    prod_host: yii3-template.duckdns.org
    project_dir: /opt/yii3
    compose_cmd: >-
      docker compose --env-file .env.prod
      -f docker/prod/compose.yml -f docker/prod/compose.local.yml

  tasks:
    - name: Set PROD_HOST in .env.prod
      ansible.builtin.lineinfile:
        path: "{{ project_dir }}/.env.prod"
        regexp: '^PROD_HOST='
        line: "PROD_HOST={{ prod_host }}"

    - name: Write compose.local.yml (loopback DB forward)
      ansible.builtin.copy:
        dest: "{{ project_dir }}/docker/prod/compose.local.yml"
        mode: "0644"
        content: |
          # Override locale del VPS, scritto da ansible (playbooks/app.yml).
          # L'app non ha più override: TrustedProxyMiddleware risolve gli
          # header X-Forwarded-* dal proxy fidato, quindi cookie di sessione
          # Secure e HSTS (con includeSubDomains) sono emessi dall'app.
          # Niente label HSTS sul proxy: per RFC 6797 conta solo il PRIMO
          # header STS e la label (senza includeSubDomains) oscurava quello
          # completo dell'app.
          services:
            db:
              ports:
                - "127.0.0.1:3307:3306"

    # Il recreate NON deve cambiare versione: senza pin, compose userebbe
    # l'APP_IMAGE di .env.prod (latest, sul VPS spesso stantio: il CD
    # deploya i tag SHA e latest non viene più pullato). È successo il
    # 2026-07-08: recreate su latest vecchio di un giorno, app rotta.
    - name: Detect running app image (recreate must not change it)
      ansible.builtin.shell: |
        set -o pipefail
        cid="$({{ compose_cmd }} ps -q app)"
        if [ -n "$cid" ]; then
          docker inspect --format '{% raw %}{{.Config.Image}}{% endraw %}' "$cid"
        fi
      args:
        chdir: "{{ project_dir }}"
        executable: /bin/bash
      register: running_image
      changed_when: false

    - name: Recreate app container
      ansible.builtin.command: "{{ compose_cmd }} up -d app"
      args:
        chdir: "{{ project_dir }}"
      environment: "{{ {'APP_IMAGE': running_image.stdout | trim} if running_image.stdout | trim != '' else {} }}"
      register: up_result
      changed_when: "'Started' in up_result.stderr or 'Recreate' in up_result.stderr"

    - name: Wait for app health on loopback
      ansible.builtin.command: >-
        curl -fsS -o /dev/null -w '%{http_code}'
        -H 'X-Forwarded-Proto: https' http://127.0.0.1:8080/login
      register: health
      retries: 12
      delay: 5
      until: health.stdout == '200'
      changed_when: false

    - name: Check HTTPS through the proxy
      ansible.builtin.command: >-
        curl -fsS -o /dev/null -w '%{http_code}' https://{{ prod_host }}/login
      register: https_health
      retries: 12
      delay: 5
      until: https_health.stdout == '200'
      changed_when: false
