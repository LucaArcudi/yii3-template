name: CI

on:
  push:
  pull_request:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read

jobs:
  test:
    name: Docker Compose CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run Trivy filesystem and config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml
          scanners: vuln,misconfig,secret
          exit-code: '0'
          version: v0.71.2
          cache: 'true'

      - name: Configure Docker user
        run: |
          mkdir -p runtime/cache/composer
          echo "LOCAL_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "LOCAL_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Build services
        run: docker compose -f compose.yml build

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: yii3-template-app:latest
          scanners: vuln,misconfig,secret
          format: table
          exit-code: '0'
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          version: v0.71.2
          cache: 'true'
          skip-setup-trivy: 'true'

      - name: Install Composer dependencies
        run: docker compose -f compose.yml run --rm --no-deps app composer install --no-interaction --prefer-dist

      - name: Validate Composer configuration
        run: docker compose -f compose.yml run --rm --no-deps app composer validate

      - name: Audit Composer dependencies
        run: docker compose -f compose.yml run --rm --no-deps app composer audit --no-interaction

      - name: Run Psalm static analysis
        run: docker compose -f compose.yml run --rm --no-deps app ./vendor/bin/psalm --no-progress --no-cache --output-format=github

      - name: Run Codeception tests
        run: |
          if [ -f codeception.yml ] || [ -f codeception.dist.yml ]; then
            docker compose -f compose.yml run --rm --no-deps app ./vendor/bin/codecept run --skip-group database
          else
            echo "Codeception is not configured; skipping tests."
          fi

      - name: Validate Prometheus config and rules
        run: |
          docker run --rm \
            -v "$PWD/docker/monitoring/prometheus:/etc/prometheus:ro" \
            --entrypoint promtool prom/prometheus:v3.1.0 \
            check config /etc/prometheus/prometheus.yml

      - name: Validate framework migrations
        run: |
          docker compose -f compose.yml up -d --wait db
          # Idempotenza: le migration rieseguono gli snapshot sopra lo schema
          # già creato da initdb.d (stesso scenario del primo run in prod).
          docker compose -f compose.yml run --rm app ./yii migrate:up -y
          # Bootstrap da zero: un DB vuoto deve essere ricostruibile dalla
          # sola catena di migration (disaster recovery / ambiente dev nuovo).
          docker compose -f compose.yml exec -T db mysql -e "DROP DATABASE yii3_template; CREATE DATABASE yii3_template;"
          docker compose -f compose.yml run --rm app ./yii migrate:up -y
          docker compose -f compose.yml run --rm app ./yii migrate:history

      - name: Verify prod image artifact
        run: |
          DOCKER_BUILDKIT=1 docker build --file docker/Dockerfile --target prod --tag yii3-template-prod:ci-check .
          # Il CD esegue ./yii migrate:up DALL'IMMAGINE, non dal checkout
          # bind-montato: questi file devono esistere nell'artefatto
          # (esclusioni .dockerignore e bit di esecuzione inclusi).
          docker run --rm --entrypoint sh yii3-template-prod:ci-check -c '
            set -e
            test -x /app/yii
            test -f /app/database/migrations/release_1_0_0.sql
            test -f /app/database/migrations/release_1_0_1.sql
            test -f /app/database/migrations/release_1_0_2.sql
            test -f /app/database/seeders/release_1_0_0.sql
            test -d /app/vendor
            echo "Artefatto prod: OK"
          '

      - name: Stop services
        if: always()
        run: docker compose -f compose.yml down --remove-orphans

  publish-image:
    name: Publish app image to GHCR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Docker user
        run: |
          echo "LOCAL_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "LOCAL_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Prepare image tags
        run: |
          image_name="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          echo "IMAGE_TAG_SHA=${image_name}:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG_LATEST=${image_name}:latest" >> "$GITHUB_ENV"

      - name: Build app image
        run: DOCKER_BUILDKIT=1 docker build --file docker/Dockerfile --target prod --pull --tag "$IMAGE_TAG_SHA" .

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push app image
        run: |
          docker tag "$IMAGE_TAG_SHA" "$IMAGE_TAG_LATEST"
          docker push "$IMAGE_TAG_SHA"
          docker push "$IMAGE_TAG_LATEST"
