name: CD

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')

    steps:
      - name: Setup SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          # tr -d '\r' tollera un secret incollato con fine riga Windows.
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" | tr -d '\r' > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          # Un secret vuoto o senza la riga per VPS_HOST emergerebbe solo come
          # "Host key verification failed" (exit 255) opaco al primo ssh.
          ssh-keygen -F "${{ secrets.VPS_HOST }}" -f ~/.ssh/known_hosts > /dev/null || {
            echo "::error::VPS_KNOWN_HOSTS non contiene una riga known_hosts per l'host di VPS_HOST"
            exit 1
          }

      - name: Update repo files on VPS
        run: |
          ssh -i ~/.ssh/vps_key -o IdentitiesOnly=yes -o BatchMode=yes "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
            set -euo pipefail

            # Senza questo allineamento il deploy aggiorna solo l'immagine:
            # compose, migration e config sul VPS resterebbero alla versione vecchia.
            git config --global --get-all safe.directory 2>/dev/null | grep -qx /opt/yii3 \
              || git config --global --add safe.directory /opt/yii3

            git -C /opt/yii3 fetch origin main
            git -C /opt/yii3 merge --ff-only origin/main
            git -C /opt/yii3 log -1 --oneline
          EOF

      - name: Backup DB on VPS
        run: |
          ssh -i ~/.ssh/vps_key -o IdentitiesOnly=yes -o BatchMode=yes "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
            set -euo pipefail

            cd /opt/yii3

            mkdir -p /opt/yii3/backups

            # Credenziali lette da .env.prod (fonte di verità), NON dall'env del
            # container db: un container creato prima dell'ultima rotazione
            # avrebbe ancora la password vecchia (Access denied, 2026-07-04).
            DB_USERNAME=$(grep -E '^DB_USERNAME=' .env.prod | head -1 | cut -d= -f2- || true)
            DB_DATABASE=$(grep -E '^DB_DATABASE=' .env.prod | head -1 | cut -d= -f2- || true)
            DB_PASSWORD=$(grep -E '^DB_PASSWORD=' .env.prod | head -1 | cut -d= -f2- || true)
            [ -n "$DB_PASSWORD" ] || { echo "DB_PASSWORD assente in .env.prod"; exit 1; }

            OUT="/opt/yii3/backups/db_$(date +%F_%H-%M-%S).sql"

            # MYSQL_PWD tiene la password fuori dalla riga di comando;
            # --single-transaction evita lock sulle tabelle dell'app live.
            docker compose \
              --env-file .env.prod \
              -f docker/prod/compose.yml \
              -f docker/prod/compose.local.yml \
              exec -T -e MYSQL_PWD="$DB_PASSWORD" db \
              mysqldump --no-tablespaces --single-transaction \
              -u"${DB_USERNAME:-yii3_template}" "${DB_DATABASE:-yii3_template}" \
              > "$OUT" || { rm -f "$OUT"; exit 1; }

            # Un dump vuoto è un backup finto: meglio fallire qui che al restore.
            [ -s "$OUT" ]

            ls -lh /opt/yii3/backups | tail
          EOF

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/vps_key -o IdentitiesOnly=yes -o BatchMode=yes "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
            set -euo pipefail

            cd /opt/yii3

            docker compose \
              --env-file .env.prod \
              -f docker/prod/compose.yml \
              -f docker/prod/compose.local.yml \
              pull

            docker compose \
              --env-file .env.prod \
              -f docker/prod/compose.yml \
              -f docker/prod/compose.local.yml \
              up -d --wait --wait-timeout 120

            docker compose \
              --env-file .env.prod \
              -f docker/prod/compose.yml \
              -f docker/prod/compose.local.yml \
              ps

            # -f fa fallire il deploy su HTTP >= 400; i retry coprono i secondi
            # di avvio del container appena ricreato. X-Forwarded-Proto simula
            # il proxy TLS: senza, il cookie Secure di sessione risponde 500.
            curl -fsS -m 10 \
              --retry 12 --retry-delay 5 --retry-all-errors \
              -H 'X-Forwarded-Proto: https' \
              -o /dev/null \
              http://127.0.0.1:8080/login

            echo "Health check OK"
          EOF