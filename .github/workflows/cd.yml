name: CD

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Setup SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Update repo files on VPS
        run: |
          ssh -i ~/.ssh/vps_key -o IdentitiesOnly=yes -o BatchMode=yes "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
            set -euo pipefail

            # Senza questo allineamento il deploy aggiorna solo l'immagine:
            # compose, migration e config sul VPS resterebbero alla versione vecchia.
            git config --global --get-all safe.directory 2>/dev/null | grep -qx /opt/yii3 \
              || git config --global --add safe.directory /opt/yii3

            git -C /opt/yii3 fetch origin main
            git -C /opt/yii3 merge --ff-only origin/main
            git -C /opt/yii3 log -1 --oneline
          EOF

      - name: Backup DB on VPS
        run: |
          ssh -i ~/.ssh/vps_key -o IdentitiesOnly=yes -o BatchMode=yes "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
            set -euo pipefail

            cd /opt/yii3

            mkdir -p /opt/yii3/backups

            docker compose \
              --env-file .env.prod \
              -f docker/prod/compose.yml \
              -f docker/prod/compose.local.yml \
              exec -T db sh -lc 'mysqldump --no-tablespaces -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" "$MYSQL_DATABASE"' \
              > /opt/yii3/backups/db_$(date +%F_%H-%M-%S).sql

            ls -lh /opt/yii3/backups | tail
          EOF

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/vps_key -o IdentitiesOnly=yes -o BatchMode=yes "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
            set -euo pipefail

            cd /opt/yii3

            docker compose \
              --env-file .env.prod \
              -f docker/prod/compose.yml \
              -f docker/prod/compose.local.yml \
              pull

            docker compose \
              --env-file .env.prod \
              -f docker/prod/compose.yml \
              -f docker/prod/compose.local.yml \
              up -d --wait --wait-timeout 120

            docker compose \
              --env-file .env.prod \
              -f docker/prod/compose.yml \
              -f docker/prod/compose.local.yml \
              ps

            # -f fa fallire il deploy su HTTP >= 400; i retry coprono i secondi
            # di avvio del container appena ricreato. X-Forwarded-Proto simula
            # il proxy TLS: senza, il cookie Secure di sessione risponde 500.
            curl -fsS -m 10 \
              --retry 12 --retry-delay 5 --retry-all-errors \
              -H 'X-Forwarded-Proto: https' \
              -o /dev/null \
              http://127.0.0.1:8080/login

            echo "Health check OK"
          EOF