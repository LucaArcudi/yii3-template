name: CD

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag dell'immagine da deployare (vuoto = SHA del commit corrente)"
        required: false
        default: ""
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')

    steps:
      # Si deploya il tag SHA pubblicato dalla CI per il commit del run,
      # non latest: ogni deploy è riproducibile e il rollback deterministico.
      - name: Resolve image to deploy
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAG="${{ github.event.workflow_run.head_sha }}"
          elif [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "APP_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:${TAG}" >> "$GITHUB_ENV"
          echo "Immagine da deployare: ghcr.io/${GITHUB_REPOSITORY,,}:${TAG}"

      - name: Setup SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          # tr -d '\r' tollera un secret incollato con fine riga Windows.
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" | tr -d '\r' > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          # Un secret vuoto o senza la riga per VPS_HOST emergerebbe solo come
          # "Host key verification failed" (exit 255) opaco al primo ssh.
          ssh-keygen -F "${{ secrets.VPS_HOST }}" -f ~/.ssh/known_hosts > /dev/null || {
            echo "::error::VPS_KNOWN_HOSTS non contiene una riga known_hosts per l'host di VPS_HOST"
            exit 1
          }

      - name: Update repo files on VPS
        run: |
          ssh -i ~/.ssh/vps_key -o IdentitiesOnly=yes -o BatchMode=yes "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
            set -euo pipefail

            # Senza questo allineamento il deploy aggiorna solo l'immagine:
            # compose, migration e config sul VPS resterebbero alla versione vecchia.
            git config --global --get-all safe.directory 2>/dev/null | grep -qx /opt/yii3 \
              || git config --global --add safe.directory /opt/yii3

            git -C /opt/yii3 fetch origin main
            git -C /opt/yii3 merge --ff-only origin/main
            git -C /opt/yii3 log -1 --oneline
          EOF

      # La logica di backup e deploy vive in scripts/*.sh, versionati nel
      # repo e allineati sul VPS dallo step precedente: il workflow li
      # INVOCA soltanto. Mai heredoc via stdin: docker compose run/exec
      # leggono stdin e divorano il resto dello script (deploy "verdi" ma
      # interrotti a metà, 2026-07-04).
      - name: Backup DB on VPS
        run: >
          ssh -i ~/.ssh/vps_key -o IdentitiesOnly=yes -o BatchMode=yes
          "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          'bash /opt/yii3/scripts/backup-db.sh'

      - name: Deploy on VPS
        run: >
          ssh -i ~/.ssh/vps_key -o IdentitiesOnly=yes -o BatchMode=yes
          "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          "APP_IMAGE='${{ env.APP_IMAGE }}' bash /opt/yii3/scripts/deploy.sh"